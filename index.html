<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* ESTILOS CRUCIALES PARA EL MODAL DE VERIFICACIÓN */
        .modal-active {
            display: flex !important;
        }
        #modal-verification {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 16px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <div class="logo-section">
                <img src="logo.png" alt="Logo de la Empresa" class="app-logo">
            </div>

            <div class="form-tabs">
                <button id="tab-login" class="tab-btn active" onclick="switchForm('login')">Iniciar Sesión</button>
                <button id="tab-register" class="tab-btn" onclick="switchForm('register')">Crear Cuenta</button>
            </div>

            <div class="social-auth">
                <button class="social-btn google-btn" onclick="loginConRedes('Google')">
                    <img src="https://www.gstatic.com/lamda/images/shared/google_logo_v2_636dd26af0e513a968600.png" alt="Google">
                    Continuar con Google
                </button>
                <button class="social-btn facebook-btn" onclick="loginConRedes('Facebook')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="Facebook">
                    Continuar con Facebook
                </button>
            </div>

            <div class="divider"><span>o utiliza tu correo</span></div>

            <form id="form-login" class="auth-form active">
                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="login-email" required placeholder="ejemplo@correo.com">
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="main-submit-btn">Ingresar</button>
            </form>

            <form id="form-register" class="auth-form">
                <div class="input-row">
                    <div class="input-group"><label>Nombre</label><input type="text" id="reg-nombre" required placeholder="Juan"></div>
                    <div class="input-group"><label>Apellido</label><input type="text" id="reg-apellido" required placeholder="Pérez"></div>
                </div>
                <div class="input-group"><label>Correo Electrónico</label><input type="email" id="reg-email" required placeholder="ejemplo@correo.com"></div>
                <div class="input-group"><label>Fecha de Nacimiento</label><input type="date" id="reg-date" required></div>
                <div class="input-group"><label>Contraseña</label><input type="password" id="reg-password" required placeholder="Mínimo 8 caracteres"></div>
                <p class="verification-notice">ℹ️ Te enviaremos un código de verificación a tu correo.</p>
                <button type="submit" class="main-submit-btn">Registrarse y Verificar</button>
            </form>
        </div>
    </div>

    <div id="modal-verification">
        <div class="modal-content">
            <h3>Verifica tu Correo</h3>
            <p>Hemos enviado un código de 6 dígitos al correo electrónico introducido.</p>
            <div class="input-group">
                <label>Introduce el Código</label>
                <input type="text" id="verification-code" maxlength="6" placeholder="123456" style="text-align: center; font-size: 24px; letter-spacing: 6px; font-weight: bold;">
            </div>
            <button onclick="verifyCode()" class="main-submit-btn" style="background: #2563eb;">Verificar Cuenta</button>
        </div>
    </div>

    <script>
        // Detecta automáticamente si estás en local o corriendo el link de Render
        const API_URL = window.location.origin;
        let tempEmail = '';

        function switchForm(type) {
            document.getElementById('tab-login').classList.remove('active');
            document.getElementById('tab-register').classList.remove('active');
            document.getElementById('form-login').classList.remove('active');
            document.getElementById('form-register').classList.remove('active');

            if(type === 'login') {
                document.getElementById('tab-login').classList.add('active');
                document.getElementById('form-login').classList.add('active');
            } else {
                document.getElementById('tab-register').classList.add('active');
                document.getElementById('form-register').classList.add('active');
            }
        }

        function loginConRedes(plataforma) {
            alert(`La integración con ${plataforma} requiere configurar las credenciales OAuth2 de desarrollo. Estará disponible próximamente.`);
        }

        // CONTROL DE REGISTRO
        document.getElementById('form-register').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nombre = document.getElementById('reg-nombre').value;
            const apellido = document.getElementById('reg-apellido').value;
            tempEmail = document.getElementById('reg-email').value;
            const fecha_nacimiento = document.getElementById('reg-date').value;
            const password = document.getElementById('reg-password').value;

            try {
                const res = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, apellido, email: tempEmail, fecha_nacimiento, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    // Forzar que el modal aparezca en pantalla usando la clase css estricta
                    document.getElementById('modal-verification').classList.add('modal-active');
                } else {
                    alert(data.mensaje);
                }
            } catch (err) { 
                alert('Error al conectar con el servidor.'); 
            }
        });

        // CONTROL DE VERIFICACIÓN DEL CÓDIGO
        async function verifyCode() {
            const codigo = document.getElementById('verification-code').value;
            try {
                const res = await fetch(`${API_URL}/api/auth/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: tempEmail, codigo })
                });
                const data = await res.json();
                alert(data.mensaje);
                if (res.ok) {
                    document.getElementById('modal-verification').classList.remove('modal-active');
                    switchForm('login');
                }
            } catch (err) { 
                alert('Error al procesar la verificación.'); 
            }
        }

        // CONTROL DE LOGIN
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    alert('¡Ingreso Exitoso!');
                    localStorage.setItem('token', data.token);
                } else {
                    alert(data.mensaje);
                }
            } catch (err) { 
                alert('Error de red en el inicio de sesión.'); 
            }
        });
    </script>
</body>
</html>
