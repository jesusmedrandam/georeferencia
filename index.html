<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-wrapper">
        
        <div class="login-container">
            <div class="logo-section">
                <img src="logo.png" alt="Logo de la Empresa" class="app-logo">
            </div>

            <div class="form-tabs">
                <button id="tab-login" class="tab-btn active" onclick="switchForm('login')">Iniciar Sesión</button>
                <button id="tab-register" class="tab-btn" onclick="switchForm('register')">Crear Cuenta</button>
            </div>

            <div class="social-auth">
                <button class="social-btn google-btn">
                    <img src="https://www.gstatic.com/lamda/images/shared/google_logo_v2_636dd26af0e513a968600.png" alt="Google">
                    
                    Continuar con Google
                </button>
                <button class="social-btn facebook-btn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="Facebook">
                    Continuar con Facebook
                </button>
            </div>

            <div class="divider">
                <span>o utiliza tu correo</span>
            </div>

            <form id="form-login" class="auth-form active">
                <div class="input-group">
                    <label for="login-email">Correo Electrónico</label>
                    <input type="email" id="login-email" required placeholder="ejemplo@correo.com">
                </div>
                <div class="input-group">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="main-submit-btn">Ingresar</button>
            </form>

            <form id="form-register" class="auth-form">
                <div class="input-row">
                    <div class="input-group">
                        <label for="reg-nombre">Nombre</label>
                        <input type="text" id="reg-nombre" required placeholder="Juan">
                    </div>
                    <div class="input-group">
                        <label for="reg-apellido">Apellido</label>
                        <input type="text" id="reg-apellido" required placeholder="Pérez">
                    </div>
                </div>
                <div class="input-group">
                    <label for="reg-email">Correo Electrónico</label>
                    <input type="email" id="reg-email" required placeholder="ejemplo@correo.com">
                </div>
                <div class="input-group">
                    <label for="reg-date">Fecha de Nacimiento</label>
                    <input type="date" id="reg-date" required>
                </div>
                <div class="input-group">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" required placeholder="Mínimo 8 caracteres">
                </div>
                
                <p class="verification-notice">ℹ️ Te enviaremos un código de verificación a tu correo.</p>
                
                <button type="submit" class="main-submit-btn">Registrarse y Verificar</button>
            </form>

        </div>
    </div>

    <script>
        function switchForm(type) {
            // Quitar clases activas
            document.getElementById('tab-login').classList.remove('active');
            document.getElementById('tab-register').classList.remove('active');
            document.getElementById('form-login').classList.remove('active');
            document.getElementById('form-register').classList.remove('active');

            // Añadir clase activa al seleccionado
            if(type === 'login') {
                document.getElementById('tab-login').classList.add('active');
                document.getElementById('form-login').classList.add('active');
            } else {
                document.getElementById('tab-register').classList.add('active');
                document.getElementById('form-register').classList.add('active');
            }
        }
    </script>
</body>
</html>
